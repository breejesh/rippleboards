<div class="control-panel">
  <div class="panel-header">
    <h2>⚙️ Intervention Simulator</h2>
  </div>

  <div class="panel-body">
    <div class="form-group">
      <label>Selected Location</label>
      <div class="location-display" [class.empty]="!selectedLocation">
        {{ selectedLocation || 'Click a location on map to begin' }}
      </div>
    </div>

    <div class="form-group">
      <label for="intervention">Intervention Type</label>
      <select [(ngModel)]="intervention" id="intervention">
        <option value="broadband_grant">🌐 Broadband Grant</option>
        <option value="housing_subsidy">🏠 Housing Subsidy</option>
        <option value="healthcare_access">🏥 Healthcare Access</option>
      </select>
    </div>

    <div class="form-group">
      <label for="intensity">Intervention Intensity</label>
      <div class="intensity-row">
        <input 
          type="range" 
          [(ngModel)]="intensity" 
          min="0" 
          max="1" 
          step="0.1"
          id="intensity">
        <span class="intensity-value">{{ (intensity * 100).toFixed(0) }}%</span>
      </div>
    </div>

    <button 
      (click)="runSimulation()" 
      [disabled]="!selectedLocation || loading"
      class="simulate-btn">
      {{ loading ? '⏳ Running...' : '▶️ Run Simulation' }}
    </button>
  </div>
</div>
